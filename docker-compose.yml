version: '3.8'

services:
  backend:
    build: .
    container_name: polinas_backend
    ports:
      - "8000:8000"
    environment:
      - DEBUG=${DEBUG:-False}
      - POSTGRES_DSN=postgresql://user:pass@db:5432/horse_db
      - REDIS_URL=redis://redis:6379/0
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=minio
      - MINIO_SECRET_KEY=minio123
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - NOTION_TOKEN=${NOTION_TOKEN}
    volumes:
      - ./src:/app/src:ro
      - ./src/app/static:/app/src/app/static
    depends_on:
      - db
      - redis
      - minio
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

  db:
    image: postgres:15
    container_name: polinas_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: horse_db
    volumes:
      - db-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: polinas_redis
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    container_name: polinas_minio
    command: server /data
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "9000:9000"
    volumes:
      - minio-data:/data

  frontend:
    image: node:20
    container_name: polinas_frontend
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:cached
    command: /bin/sh -lc "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  db-data:
  minio-data:
