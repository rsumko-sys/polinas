version: '3.8'
services:
  web:
    build: .
    container_name: polinas_web
    ports:
      - "8000:8000"
    environment:
      - ADMIN_API_KEY=${ADMIN_API_KEY}
      - NOTION_TOKEN=${NOTION_TOKEN}
    volumes:
      - ./src:/app/src:ro
      - ./src/app/static:/app/src/app/static
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
version: '3.8'
services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "8000:8000"
    volumes:
      - ./:/app:cached

  frontend:
    image: node:20
    working_dir: /app
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app:cached
    command: /bin/sh -lc "npm ci && npm run dev -- --host 0.0.0.0 --port 5173"
